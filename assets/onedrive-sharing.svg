<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">OneDrive sharing dialog screenshot</title>
  <desc id="desc">Synthetic OneDrive sharing dialog with link settings and permissions.</desc>
  <rect width="1280" height="720" fill="#eff2f8"/>
  <rect x="0" y="0" width="1280" height="720" fill="#111827" opacity=".28"/>
  <rect x="350" y="92" width="580" height="536" rx="18" fill="#fff" stroke="#d8e0ea" stroke-width="2"/>
  <text x="390" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Share Draft project plan.docx</text>
  <rect x="390" y="182" width="500" height="58" rx="12" fill="#f8fafc" stroke="#d8e0ea"/>
  <text x="416" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#4b5563">Add a name, group, or email</text>
  <text x="390" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">Link settings</text>
  <rect x="390" y="306" width="500" height="64" rx="12" fill="#e8f3ff" stroke="#0078d4" stroke-width="2"/>
  <text x="420" y="344" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#111827">Specific people can view</text>
  <rect x="390" y="386" width="500" height="64" rx="12" fill="#f8fafc" stroke="#d8e0ea"/>
  <text x="420" y="424" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#111827">People in your organization can view</text>
  <rect x="390" y="466" width="500" height="64" rx="12" fill="#f8fafc" stroke="#d8e0ea"/>
  <text x="420" y="504" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#111827">Allow editing</text>
  <rect x="390" y="554" width="140" height="48" rx="12" fill="#0078d4"/>
  <text x="460" y="585" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#fff">Send</text>
  <rect x="548" y="554" width="154" height="48" rx="12" fill="#f8fafc" stroke="#d8e0ea"/>
  <text x="625" y="585" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">Copy link</text>
  <g transform="translate(106 132)">
    <rect width="190" height="456" rx="18" fill="#fff" stroke="#d8e0ea"/>
    <text x="24" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Before sharing</text>
    <text x="24" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#4b5563">1. Confirm owner</text>
    <text x="24" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#4b5563">2. Choose audience</text>
    <text x="24" y="160" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#4b5563">3. Pick view/edit</text>
    <text x="24" y="194" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#4b5563">4. Set expiry</text>
    <text x="24" y="228" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#4b5563">5. Avoid broad links</text>
  </g>
</svg>
